<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Loblaw Bio — Cell Count Dashboard</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: whitesmoke;
            color: black;
            line-height: 1.6;
        }

        nav{
            background: darkslateblue;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 8px gray;
        }

        nav .brand{
            color: white;
            font-size: 22px;
            font-weight: bold;
            margin-right: 20px;
        }

        nav a{
            color: lightgray;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
            padding: 6px 10px;
            border-radius: 6px;
        }

        nav a:hover{
            background: slateblue;
            color: white;
        }

        nav a.active{
            background: royalblue;
            color: white;
        }

        main{
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 12px lightgray;
        }

        h1{
            font-size: 42px;
            margin-bottom: 20px;
            color: navy;
        }

        h2{
            margin-top: 30px;
            margin-bottom: 15px;
            color: darkslategray;
        }

        p{
            margin-bottom: 15px;
            color: dimgray;
        }

        ul{
            margin-left: 25px;
            margin-top: 10px;
        }

        li{
            margin-bottom: 12px;
        }

        strong{
            color: black;
        }
    </style>    
</head>
<body>
  <nav>
    <span class="brand">Loblaw Bio</span>
    <a href="/" class="{{ 'active' if active=='index' else '' }}">Overview</a>
    <a href="/frequencies" class="{{ 'active' if active=='freq' else '' }}">Part 2 — Frequencies</a>
    <a href="/responders"  class="{{ 'active' if active=='resp' else '' }}">Part 3 — Responders</a>
    <a href="/subset"      class="{{ 'active' if active=='subset' else '' }}">Part 4 — Subset</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
